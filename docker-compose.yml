services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmms
      POSTGRES_USER: cmms
      POSTGRES_PASSWORD: cmms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: src/CmmsHome.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=cmms;Username=cmms;Password=cmms
    depends_on:
      - db

volumes:
  postgres_data:
